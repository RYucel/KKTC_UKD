name: Refresh UKD data

# Rebuilds data/combined_ukd.parquet from kksf.org and commits any changes.
# Streamlit Community Cloud auto-redeploys when this pushes to main.

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch: {}    # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild dataset from kksf.org
        run: python data_loader.py

      - name: Commit updated data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/combined_ukd.parquet; then
            echo "No data changes."
          else
            git add data/combined_ukd.parquet
            git commit -m "Auto-refresh UKD data ($(date -u +%Y-%m-%d))"
            git push
          fi
